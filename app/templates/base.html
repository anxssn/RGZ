<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YADRO | Видеоплатформа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }

        /* Анимированный градиентный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 30%, rgba(102, 126, 234, 0.2) 0%, rgba(0, 0, 0, 0.95) 70%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('{{ url_for("static", filename="bg.png") }}') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
        }

        /* Навигационная панель - glassmorphism */
        .navbar {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 40%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            position: relative;
        }

        .logo h2::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30%;
            height: 2px;
            background: linear-gradient(90deg, #667eea, transparent);
            border-radius: 2px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 40px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            position: relative;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-links a:hover::before {
            width: 40%;
        }

        .nav-links a:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-name {
            color: #a8b2ff;
            font-size: 14px;
            font-weight: 500;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .logout-btn {
            background: rgba(231, 76, 60, 0.15);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .logout-btn:hover {
            background: #e74c3c;
            color: #fff;
            transform: scale(1.05);
        }

        /* Основной контейнер */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* Премиальные карточки */
        .card {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transition: left 0.6s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            border-color: rgba(102, 126, 234, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a8b2ff 60%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: 1.4rem;
            margin-bottom: 24px;
            font-weight: 600;
            color: #e8e8e8;
            display: inline-block;
            position: relative;
        }

        h3::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
        }

        /* Стильные формы */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #aaa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: scale(1.01);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -8px rgba(102, 126, 234, 0.5);
        }

        /* Современная сетка видео */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        .video-card {
            background: rgba(10, 10, 15, 0.8);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1;
        }

        .video-card:hover::before {
            opacity: 1;
        }

        .video-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.6);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .video-thumbnail {
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .video-card video {
            width: 100%;
            max-height: 200px;
            height: auto;
            transition: transform 0.5s ease;
        }

        .video-card:hover video {
            transform: scale(1.05);
        }

        .video-info {
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .video-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 15px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-clamp: 2; 
        }

        .video-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 16px;
        }

        .video-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Стильный чат */
        .chat-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            overflow: hidden;
        }

        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 24px;
        }

        .message {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .message:hover {
            background: rgba(102, 126, 234, 0.15);
            transform: translateX(5px);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .message strong {
            color: #a8b2ff;
            font-weight: 600;
        }

        .message small {
            font-size: 10px;
            color: #555;
            margin-left: 12px;
        }

        .message p {
            margin-top: 8px;
            font-size: 14px;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-input-area input {
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.5);
        }

        .chat-input-area button {
            width: auto;
            padding: 12px 32px;
            border-radius: 40px;
        }

        /* Кнопка удаления */
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 10px 25px -8px rgba(231, 76, 60, 0.5);
        }

        /* Полноэкранный режим */
        video:fullscreen,
        video:-webkit-full-screen,
        video:-moz-full-screen {
            object-fit: contain !important;
            width: auto !important;
            height: auto !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000 !important;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
                flex-direction: column;
            }
            
            .video-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .container {
                padding: 20px 16px;
            }
            
            .card {
                padding: 20px;
            }
        }

        /* Анимации */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
            }
            100% {
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
            }
        }

        .card, .video-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #667eea;
        }

        .home-button {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h2>YADRO</h2>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">🏠 Главная</a>
            <a href="{{ url_for('video') }}">🎥 Видео</a>
            {% if session.username %}
                <a href="{{ url_for('account') }}">👤 Аккаунт</a>
            {% endif %}
        </div>
        <div class="user-info">
            {% if session.username %}
                <span class="user-name">👋 {{ session.username }}</span>
                <a href="{{ url_for('logout') }}" class="logout-btn">🚪 Выйти</a>
            {% else %}
                <a href="{{ url_for('login') }}" style="background: rgba(102,126,234,0.15); border-radius: 40px; padding: 8px 22px; text-decoration: none; color: #a8b2ff; font-weight: 500;">🔑 Войти</a>
                <a href="{{ url_for('register') }}" style="background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 40px; padding: 8px 22px; text-decoration: none; color: #fff; font-weight: 500;">✨ Регистрация</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        document.addEventListener('fullscreenchange', function() {
            const videos = document.querySelectorAll('video');
            videos.forEach(video => {
                if (document.fullscreenElement === video) {
                    video.style.objectFit = 'contain';
                }
            });
        });
    </script>
</body>
</html>
