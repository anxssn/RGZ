{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1 style="text-align: center;">📝 Регистрация</h1>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div style="background: rgba(74, 222, 128, 0.2); border: 1px solid #4ade80; border-radius: 10px; padding: 12px; margin-bottom: 20px; text-align: center;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label>👤 Имя пользователя <span style="color: #e74c3c;">*</span></label>
            <input type="text" name="username" required placeholder="Придумайте имя">
        </div>
        
        <div class="form-group">
            <label>📧 Email <span style="color: #e74c3c;">*</span></label>
            <input type="email" name="email" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
            <label>🔒 Пароль <span style="color: #e74c3c;">*</span></label>
            <input type="password" name="password" required placeholder="Придумайте пароль">
        </div>
        
        <button type="submit" style="width: 100%;">📝 Зарегистрироваться</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('login') }}" style="color: #a8b2ff;">Уже есть аккаунт? Войдите</a><br>
        <a href="{{ url_for('index') }}" style="color: #888; font-size: 14px;">🏠 На главную</a>
    </div>
</div>
{% endblock %}
