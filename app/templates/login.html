{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 0 auto;">
    <h1 style="text-align: center;">🔑 Вход</h1>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div style="background: rgba(74, 222, 128, 0.2); border: 1px solid #4ade80; border-radius: 10px; padding: 12px; margin-bottom: 20px; text-align: center;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>👤 Имя пользователя</label>
            <input type="text" name="username" required placeholder="Введите имя пользователя">
        </div>
        
        <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" name="password" required placeholder="Введите пароль">
        </div>
        
        <button type="submit" style="width: 100%;">🚪 Войти</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('register') }}" style="color: #a8b2ff;">Нет аккаунта? Зарегистрируйтесь</a><br>
        <a href="{{ url_for('index') }}" style="color: #888; font-size: 14px;">🏠 На главную</a>
    </div>
</div>
{% endblock %}
